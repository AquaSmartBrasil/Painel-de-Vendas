<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Vendas — AquaSmart</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f5f5f5; color: #1a1a1a; padding: 1.25rem; }
.topo { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 8px; }
.titulo { font-size: 20px; font-weight: 600; color: #185FA5; }
.btns-topo { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1rem; }
.card { background: #efefef; border-radius: 8px; padding: 14px 16px; }
.card-label { font-size: 12px; color: #666; margin-bottom: 5px; }
.card-val { font-size: 20px; font-weight: 600; }
.card-sub { font-size: 11px; color: #999; margin-top: 3px; }
.card-edit { font-size: 11px; color: #185FA5; cursor: pointer; margin-top: 4px; display: inline-block; }
.card-input-wrap { display: none; margin-top: 6px; }
.card-input-wrap.ativo { display: flex; gap: 4px; align-items: center; }
.card-input-wrap input { width: 70px; font-size: 13px; padding: 3px 6px; border: 1px solid #ccc; border-radius: 4px; }
.card-input-wrap button { font-size: 11px; padding: 3px 8px; border-radius: 4px; border: none; background: #185FA5; color: #fff; cursor: pointer; }
.clientes-bar { margin-bottom: 1.5rem; }
.clientes-bar-inner { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 1rem 1.125rem; }
.clientes-titulo { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 12px; }
.clientes-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; }
.cli-item { background: #f8f8f8; border-radius: 8px; padding: 10px 12px; }
.cli-label { font-size: 11px; color: #666; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
.cli-label span { cursor: pointer; color: #185FA5; font-size: 10px; }
.cli-nums { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
.cli-bar-bg { width: 100%; height: 6px; background: #ddd; border-radius: 3px; overflow: hidden; }
.cli-bar-fill { height: 100%; border-radius: 3px; transition: width .4s; }
.cli-input-wrap { display: none; margin-top: 6px; }
.cli-input-wrap.ativo { display: flex; gap: 4px; }
.cli-input-wrap input { width: 60px; font-size: 12px; padding: 2px 5px; border: 1px solid #ccc; border-radius: 4px; }
.cli-input-wrap button { font-size: 11px; padding: 2px 7px; border-radius: 4px; border: none; background: #185FA5; color: #fff; cursor: pointer; }
.tabs { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
.tab { font-size: 13px; cursor: pointer; padding: 6px 14px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #666; }
.tab.active { background: #eee; color: #111; font-weight: 600; border-color: #bbb; }
.seller-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 1rem 1.125rem; margin-bottom: 1rem; }
.seller-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
.seller-name { font-size: 14px; font-weight: 600; }
.seller-total { font-size: 12px; color: #666; margin-top: 2px; }
.seller-pct { margin-left: auto; text-align: right; }
.seller-pct-val { font-size: 18px; font-weight: 600; display: block; }
.seller-pct-cli { font-size: 11px; color: #999; }
.bar-bg { width: 100%; height: 7px; background: #eee; border-radius: 4px; overflow: hidden; margin-bottom: 14px; }
.bar-fill { height: 100%; border-radius: 4px; transition: width .5s; }
.client-list { display: flex; flex-direction: column; gap: 7px; }
.client-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.client-name { color: #555; width: 160px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.client-bar-bg { flex: 1; height: 5px; background: #eee; border-radius: 3px; overflow: hidden; }
.client-bar-fill { height: 100%; border-radius: 3px; }
.client-vals { display: flex; gap: 6px; align-items: center; flex-shrink: 0; min-width: 140px; justify-content: flex-end; }
.badge { display: inline-block; padding: 2px 7px; border-radius: 6px; font-size: 11px; font-weight: 600; }
.badge-green { background: #EAF3DE; color: #3B6D11; }
.badge-amber { background: #FAEEDA; color: #854F0B; }
.badge-red { background: #FCEBEB; color: #A32D2D; }
.badge-status { padding: 4px 12px; font-size: 13px; }
.loading { text-align: center; padding: 3rem; color: #888; font-size: 14px; }
.erro { text-align: center; padding: 2rem; color: #c00; font-size: 13px; line-height: 1.8; background: #fff8f8; border-radius: 8px; border: 1px solid #fcc; }
.rodape { margin-top: 10px; font-size: 11px; color: #aaa; }
button.refresh { font-size: 12px; padding: 5px 14px; border-radius: 6px; border: 1px solid #ddd; background: #fff; cursor: pointer; }
button.refresh:hover { background: #f0f0f0; }
button.btn-proj { font-size: 12px; padding: 5px 14px; border-radius: 6px; border: 1px solid #185FA5; background: #185FA5; color: #fff; cursor: pointer; font-weight: 600; }
button.btn-proj:hover { background: #0C447C; }
.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: flex-start; padding: 1rem; overflow-y: auto; }
.modal-overlay.aberto { display: flex; }
.modal { background: #fff; border-radius: 12px; padding: 1.5rem; width: 100%; max-width: 800px; margin: auto; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
.modal-titulo { font-size: 18px; font-weight: 600; color: #185FA5; }
.btn-fechar { font-size: 20px; cursor: pointer; color: #999; background: none; border: none; line-height: 1; }
.proj-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
.proj-card { background: #f5f5f5; border-radius: 8px; padding: 12px 14px; }
.proj-card-label { font-size: 11px; color: #666; margin-bottom: 4px; }
.proj-card-val { font-size: 18px; font-weight: 600; }
.proj-card-sub { font-size: 10px; color: #999; margin-top: 2px; }
table.proj-table { width: 100%; border-collapse: collapse; font-size: 13px; }
table.proj-table th { background: #185FA5; color: #fff; padding: 8px 10px; text-align: right; font-weight: 600; }
table.proj-table th:first-child { text-align: left; }
table.proj-table td { padding: 7px 10px; text-align: right; border-bottom: 1px solid #eee; }
table.proj-table td:first-child { text-align: left; font-weight: 500; }
table.proj-table tr.real td { color: #1D9E75; }
table.proj-table tr.total-row td { font-weight: 700; background: #f0f0f0; border-top: 2px solid #ddd; }
.legenda { display: flex; gap: 16px; margin-bottom: 1rem; font-size: 12px; color: #666; flex-wrap: wrap; }
.dot-real { width: 10px; height: 10px; border-radius: 2px; background: #1D9E75; display: inline-block; }
.dot-meta { width: 10px; height: 10px; border-radius: 2px; background: #185FA5; display: inline-block; }
.acumulado-bar { margin-top: 1.25rem; }
.acumulado-label { font-size: 12px; color: #666; margin-bottom: 6px; display: flex; justify-content: space-between; }
.acumulado-bg { width: 100%; height: 12px; background: #eee; border-radius: 6px; overflow: hidden; }
.acumulado-fill { height: 100%; border-radius: 6px; background: #1D9E75; }
</style>
</head>
<body>

<div class="topo">
  <span class="titulo">Painel de vendas — AquaSmart</span>
  <div class="btns-topo">
    <div id="status-geral" class="badge badge-amber badge-status" style="display:none"></div>
    <button class="btn-proj" onclick="abrirProjecao()">Projeção 2026</button>
    <button class="refresh" onclick="carregar()">Atualizar</button>
  </div>
</div>

<div id="conteudo"><div class="loading">Carregando dados da planilha...</div></div>
<div class="rodape"><span id="atualizado"></span></div>

<div class="modal-overlay" id="modalProj">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-titulo">Projeção anual 2026</span>
      <button class="btn-fechar" onclick="fecharProjecao()">×</button>
    </div>
    <div id="modal-conteudo"></div>
  </div>
</div>

<script>
const URL_VENDAS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS08xvX_Kqv4oHay2RgpA4PLOKg1Pu6xADTYUdrc3vABmiiubF790pFppq8CuDooaRg8srzPIZDwiLU/pub?gid=73406152&single=true&output=csv';
const URL_METAS  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS08xvX_Kqv4oHay2RgpA4PLOKg1Pu6xADTYUdrc3vABmiiubF790pFppq8CuDooaRg8srzPIZDwiLU/pub?gid=584506356&single=true&output=csv';

const CORES = [
  {bg:'#E6F1FB',text:'#0C447C',bar:'#378ADD'},
  {bg:'#E1F5EE',text:'#085041',bar:'#1D9E75'},
  {bg:'#EEEDFE',text:'#3C3489',bar:'#7F77DD'},
  {bg:'#FAEEDA',text:'#854F0B',bar:'#BA7517'},
  {bg:'#FBEAF0',text:'#72243E',bar:'#D4537E'},
];

const METAS_ANUAIS = {
  1:{total:151859,bb:110456,ca:41403,lu:0,tipo:'real'},
  2:{total:110317,bb:66575,ca:24015,lu:19726,tipo:'real'},
  3:{total:137702,bb:76767,ca:35789,lu:25146,tipo:'real'},
  4:{total:160000,bb:72000,ca:48000,lu:40000,tipo:'meta'},
  5:{total:160000,bb:72000,ca:48000,lu:40000,tipo:'meta'},
  6:{total:210000,bb:94500,ca:63000,lu:52500,tipo:'meta'},
  7:{total:195000,bb:87750,ca:58500,lu:48750,tipo:'meta'},
  8:{total:175000,bb:78750,ca:52500,lu:43750,tipo:'meta'},
  9:{total:190000,bb:85500,ca:57000,lu:47500,tipo:'meta'},
  10:{total:170000,bb:76500,ca:51000,lu:42500,tipo:'meta'},
  11:{total:195000,bb:87750,ca:58500,lu:48750,tipo:'meta'},
  12:{total:145000,bb:65250,ca:43500,lu:36250,tipo:'meta'},
};

const MESES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

// Metas de clientes — editáveis pelo usuário (salvas em memória)
let metasClientes = {
  '_empresa': 80,
  'Bruno Braga': 35,
  'Cauan': 25,
  'Luiz': 20,
};

let abaAtiva = -1;
let _vendedores = null;

function fmt(v){ return 'R$ ' + Math.round(v).toLocaleString('pt-BR'); }
function pct(v,m){ return m>0 ? Math.min(Math.round((v/m)*100),100) : 0; }
function badgeStatus(p){
  if(p>=100) return ['badge-green','Meta batida'];
  if(p>=60)  return ['badge-amber','Em andamento'];
  return ['badge-red','Atenção'];
}

function parseCSV(txt){
  const rows = [];
  for(const l of txt.trim().split('\n')){
    const cols=[]; let cur='', inQ=false;
    for(let i=0;i<l.length;i++){
      if(l[i]==='"'){inQ=!inQ;continue;}
      if(l[i]===','&&!inQ){cols.push(cur.trim());cur='';continue;}
      cur+=l[i];
    }
    cols.push(cur.trim());
    rows.push(cols);
  }
  return rows;
}

function parseValor(s){
  if(!s) return 0;
  const limpo = s.replace(/[R$\s]/g,'').trim();
  if(limpo.includes(',')&&limpo.includes('.')) return parseFloat(limpo.replace(/\./g,'').replace(',','.')) || 0;
  if(limpo.includes(',')&&!limpo.includes('.')) return parseFloat(limpo.replace(',','.')) || 0;
  return parseFloat(limpo) || 0;
}

function isLixo(s){
  if(!s) return true;
  const t=s.toLowerCase().trim();
  return t===''||t==='vendedor'||t.includes('meta')||t.includes('preencha')||
         t.includes('resumo')||t.includes('gerado')||t.includes('faturamento')||t.includes('preenchida');
}

async function carregar(){
  document.getElementById('conteudo').innerHTML='<div class="loading">Atualizando dados...</div>';
  document.getElementById('atualizado').textContent='';
  try {
    const [rv, rm] = await Promise.all([
      fetch(URL_VENDAS).then(r=>r.text()),
      fetch(URL_METAS).then(r=>r.text())
    ]);
    const linhasV=parseCSV(rv), linhasM=parseCSV(rm);
    const dados={};

    for(const row of linhasM){
      const v=(row[0]||'').trim(), c=(row[1]||'').trim(), mt=parseValor(row[2]||'0');
      if(isLixo(v)||isLixo(c)||mt<=0) continue;
      if(!dados[v]) dados[v]={clientes:{}};
      if(!dados[v].clientes[c]) dados[v].clientes[c]={vendido:0,meta:0};
      dados[v].clientes[c].meta+=mt;
    }

    for(let i=1;i<linhasV.length;i++){
      const row=linhasV[i];
      const v=(row[0]||'').trim(), c=(row[1]||'').trim(), val=parseValor(row[2]||'0');
      if(isLixo(v)||isLixo(c)||val<=0) continue;
      if(!dados[v]) dados[v]={clientes:{}};
      if(!dados[v].clientes[c]) dados[v].clientes[c]={vendido:0,meta:0};
      dados[v].clientes[c].vendido+=val;
    }

    _vendedores = Object.entries(dados)
      .map(([nome,d])=>({
        nome,
        clientes: Object.entries(d.clientes).map(([cn,cv])=>({nome:cn,...cv})).sort((a,b)=>b.meta-a.meta)
      }))
      .filter(v=>v.clientes.length>0);

    if(_vendedores.length===0){
      document.getElementById('conteudo').innerHTML='<div class="loading">Planilha conectada! Aguardando dados.</div>';
      return;
    }

    renderDash();
    const agora=new Date();
    document.getElementById('atualizado').textContent=
      'Atualizado às '+agora.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})+
      ' · '+_vendedores.length+' vendedores · '+
      _vendedores.reduce((s,v)=>s+v.clientes.filter(c=>c.vendido>0).length,0)+' clientes atendidos';

  } catch(e){
    document.getElementById('conteudo').innerHTML=`<div class="erro">Não foi possível carregar os dados.<br>${e.message}</div>`;
  }
}

function renderDash(){
  if(!_vendedores) return;

  const totalV=_vendedores.reduce((s,v)=>s+v.clientes.reduce((a,c)=>a+c.vendido,0),0);
  const totalM=_vendedores.reduce((s,v)=>s+v.clientes.reduce((a,c)=>a+c.meta,0),0);
  const totalP=pct(totalV,totalM);
  const [sc,st]=badgeStatus(totalP);
  const sg=document.getElementById('status-geral');
  sg.className='badge badge-status '+sc; sg.textContent=st; sg.style.display='';

  // Clientes atendidos (com vendas) por vendedor
  const clientesAtendidos = {};
  _vendedores.forEach(v=>{
    clientesAtendidos[v.nome] = v.clientes.filter(c=>c.vendido>0).length;
  });
  const totalAtendidos = Object.values(clientesAtendidos).reduce((s,n)=>s+n,0);
  const metaEmpresa = metasClientes['_empresa'] || 0;
  const pctClientes = pct(totalAtendidos, metaEmpresa);

  // Cards resumo vendas
  let html=`<div class="cards">
    <div class="card"><div class="card-label">Total vendido</div><div class="card-val">${fmt(totalV)}</div><div class="card-sub">este mês</div></div>
    <div class="card"><div class="card-label">Meta total</div><div class="card-val">${fmt(totalM)}</div><div class="card-sub">somando todos</div></div>
    <div class="card"><div class="card-label">Progresso</div><div class="card-val">${totalP}%</div><div class="card-sub">da meta geral</div></div>
    <div class="card"><div class="card-label">Faltam</div><div class="card-val">${totalV>=totalM?'Batida!':fmt(totalM-totalV)}</div><div class="card-sub">para meta geral</div></div>
  </div>`;

  // Bloco clientes atendidos
  html += `<div class="clientes-bar">
    <div class="clientes-bar-inner">
      <div class="clientes-titulo">Clientes atendidos este mês</div>
      <div class="clientes-grid">`;

  // Card empresa (total)
  const [cbc0,cbt0] = badgeStatus(pctClientes);
  html += `<div class="cli-item">
    <div class="cli-label">Empresa <span onclick="toggleCliInput('_empresa')">editar meta</span></div>
    <div class="cli-nums">${totalAtendidos} <span style="font-weight:400;color:#999;font-size:11px">/ ${metaEmpresa} meta</span> <span class="badge ${cbc0}" style="font-size:10px;padding:1px 5px">${pctClientes}%</span></div>
    <div class="cli-bar-bg"><div class="cli-bar-fill" style="width:${pctClientes}%;background:#185FA5"></div></div>
    <div class="cli-input-wrap" id="cli-input-_empresa">
      <input type="number" id="cli-val-_empresa" value="${metaEmpresa}" min="1">
      <button onclick="salvarMetaCli('_empresa')">OK</button>
    </div>
  </div>`;

  // Card por vendedor
  _vendedores.forEach((v,i)=>{
    const c=CORES[i%CORES.length];
    const atend = clientesAtendidos[v.nome]||0;
    const meta = metasClientes[v.nome]||0;
    const p = pct(atend, meta);
    const [cbc,cbt] = badgeStatus(p);
    const key = v.nome.replace(/\s/g,'_');
    html += `<div class="cli-item">
      <div class="cli-label">${v.nome.split(' ')[0]} <span onclick="toggleCliInput('${v.nome}')">editar meta</span></div>
      <div class="cli-nums">${atend} <span style="font-weight:400;color:#999;font-size:11px">/ ${meta} meta</span> <span class="badge ${cbc}" style="font-size:10px;padding:1px 5px">${p}%</span></div>
      <div class="cli-bar-bg"><div class="cli-bar-fill" style="width:${p}%;background:${c.bar}"></div></div>
      <div class="cli-input-wrap" id="cli-input-${key}">
        <input type="number" id="cli-val-${key}" value="${meta}" min="1">
        <button onclick="salvarMetaCli('${v.nome}')">OK</button>
      </div>
    </div>`;
  });

  html += `</div></div></div>`;

  // Tabs
  html+=`<div class="tabs"><button class="tab ${abaAtiva===-1?'active':''}" onclick="setAba(-1,this)">Todos</button>`;
  _vendedores.forEach((v,i)=>{html+=`<button class="tab ${abaAtiva===i?'active':''}" onclick="setAba(${i},this)">${v.nome.split(' ')[0]}</button>`;});
  html+=`</div>`;

  // Vendedores
  const lista = abaAtiva===-1 ? _vendedores.map((_,i)=>i) : [abaAtiva];
  lista.forEach(i=>{
    const v=_vendedores[i], c=CORES[i%CORES.length];
    const tv=v.clientes.reduce((s,cl)=>s+cl.vendido,0);
    const tm=v.clientes.reduce((s,cl)=>s+cl.meta,0);
    const tp=pct(tv,tm);
    const ini=v.nome.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();
    const atend=clientesAtendidos[v.nome]||0;
    const metaCli=metasClientes[v.nome]||0;
    const pCli=pct(atend,metaCli);

    const clienteRows=v.clientes.map(cl=>{
      const cp=pct(cl.vendido,cl.meta);
      const [cbc,cbt]=badgeStatus(cp);
      const temVenda = cl.vendido>0 ? '' : 'opacity:0.5';
      return `<div class="client-row" style="${temVenda}">
        <span class="client-name">${cl.nome}</span>
        <div class="client-bar-bg"><div class="client-bar-fill" style="width:${cp}%;background:${c.bar}"></div></div>
        <div class="client-vals">
          <span style="font-weight:600;min-width:34px;text-align:right">${cp}%</span>
          <span style="color:#999;font-size:11px">${fmt(cl.vendido)} / ${fmt(cl.meta)}</span>
          <span class="badge ${cbc}" style="font-size:10px;padding:1px 6px">${cbt}</span>
        </div>
      </div>`;
    }).join('');

    html+=`<div class="seller-card">
      <div class="seller-header">
        <div class="avatar" style="background:${c.bg};color:${c.text}">${ini}</div>
        <div>
          <div class="seller-name">${v.nome}</div>
          <div class="seller-total">${fmt(tv)} vendido de ${fmt(tm)} — ${v.clientes.length} clientes</div>
        </div>
        <div class="seller-pct">
          <span class="seller-pct-val" style="color:${c.bar}">${tp}%</span>
          <span class="seller-pct-cli">${atend}/${metaCli} clientes (${pCli}%)</span>
        </div>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${tp}%;background:${c.bar}"></div></div>
      <div class="client-list">${clienteRows}</div>
    </div>`;
  });

  document.getElementById('conteudo').innerHTML=html;
}

function setAba(i, btn){
  abaAtiva=i;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderDash();
}

function toggleCliInput(nome){
  const key = nome.replace(/\s/g,'_');
  const el = document.getElementById('cli-input-'+key);
  if(el) el.classList.toggle('ativo');
}

function salvarMetaCli(nome){
  const key = nome.replace(/\s/g,'_');
  const val = parseInt(document.getElementById('cli-val-'+key).value)||0;
  if(val>0){
    metasClientes[nome] = val;
    renderDash();
  }
}

function abrirProjecao(){
  const mesAtual = new Date().getMonth()+1;
  const totalAnual = Object.values(METAS_ANUAIS).reduce((s,m)=>s+m.total,0);
  const acumulado = Object.entries(METAS_ANUAIS).filter(([m])=>parseInt(m)<=mesAtual).reduce((s,[,m])=>s+m.total,0);
  const pctAno = Math.round((acumulado/totalAnual)*100);
  const totBB=Object.values(METAS_ANUAIS).reduce((s,m)=>s+m.bb,0);
  const totCA=Object.values(METAS_ANUAIS).reduce((s,m)=>s+m.ca,0);
  const totLU=Object.values(METAS_ANUAIS).reduce((s,m)=>s+m.lu,0);

  let html=`<div class="proj-cards">
    <div class="proj-card"><div class="proj-card-label">Meta anual</div><div class="proj-card-val">${fmt(totalAnual)}</div><div class="proj-card-sub">total 2026</div></div>
    <div class="proj-card"><div class="proj-card-label">Bruno Braga</div><div class="proj-card-val">${fmt(totBB)}</div><div class="proj-card-sub">45%</div></div>
    <div class="proj-card"><div class="proj-card-label">Cauan</div><div class="proj-card-val">${fmt(totCA)}</div><div class="proj-card-sub">30%</div></div>
    <div class="proj-card"><div class="proj-card-label">Luiz</div><div class="proj-card-val">${fmt(totLU)}</div><div class="proj-card-sub">25%</div></div>
  </div>
  <div class="legenda"><span><span class="dot-real"></span> Meses reais</span><span><span class="dot-meta"></span> Meses com meta</span></div>
  <table class="proj-table">
    <thead><tr><th>Mês</th><th>Bruno Braga</th><th>Cauan</th><th>Luiz</th><th>Total</th></tr></thead>
    <tbody>`;

  for(let m=1;m<=12;m++){
    const d=METAS_ANUAIS[m];
    const cls=d.tipo==='real'?'real':'meta';
    const label=d.tipo==='real'?'✓ '+MESES[m-1]:MESES[m-1];
    html+=`<tr class="${cls}"><td>${label}</td><td>${fmt(d.bb)}</td><td>${fmt(d.ca)}</td><td>${fmt(d.lu)}</td><td><strong>${fmt(d.total)}</strong></td></tr>`;
  }

  html+=`</tbody><tfoot><tr class="total-row"><td>Total</td><td>${fmt(totBB)}</td><td>${fmt(totCA)}</td><td>${fmt(totLU)}</td><td>${fmt(totBB+totCA+totLU)}</td></tr></tfoot></table>
  <div class="acumulado-bar">
    <div class="acumulado-label"><span>Progresso no ano</span><span>${pctAno}% — ${fmt(acumulado)} de ${fmt(totalAnual)}</span></div>
    <div class="acumulado-bg"><div class="acumulado-fill" style="width:${pctAno}%"></div></div>
  </div>`;

  document.getElementById('modal-conteudo').innerHTML=html;
  document.getElementById('modalProj').classList.add('aberto');
}

function fecharProjecao(){
  document.getElementById('modalProj').classList.remove('aberto');
}

document.getElementById('modalProj').addEventListener('click',function(e){
  if(e.target===this) fecharProjecao();
});

carregar();
</script>
</body>
</html>
