<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Vendas — AquaSmart</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f5;color:#1a1a1a;padding:1.25rem}
.topo{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px}
.titulo{font-size:20px;font-weight:600;color:#185FA5}
.btns-topo{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1rem}
.card{background:#efefef;border-radius:8px;padding:14px 16px}
.card-label{font-size:12px;color:#666;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
.card-val{font-size:20px;font-weight:600}
.card-sub{font-size:11px;color:#999;margin-top:3px}
.edit-link{font-size:10px;color:#185FA5;cursor:pointer;white-space:nowrap;margin-left:4px}
.inline-edit{display:none;margin-top:6px}
.inline-edit.ativo{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.inline-edit input{width:110px;font-size:12px;padding:3px 6px;border:1px solid #ccc;border-radius:4px}
.inline-edit button{font-size:11px;padding:3px 8px;border-radius:4px;border:none;background:#185FA5;color:#fff;cursor:pointer}
.inline-edit button.cancel{background:#ccc;color:#333}
.grafico-bloco{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1rem 1.125rem;margin-bottom:1rem}
.grafico-titulo{font-size:13px;font-weight:600;color:#333;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.legenda-graf{display:flex;gap:16px;font-size:11px;color:#666}
.legenda-item{display:flex;align-items:center;gap:5px}
.legenda-dot{width:10px;height:10px;border-radius:2px}
.nav-meses{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.nav-mes{font-size:12px;cursor:pointer;padding:5px 12px;border-radius:6px;border:1px solid #ddd;background:#fff;color:#666}
.nav-mes:hover{background:#f0f0f0}
.nav-mes.real{border-color:#1D9E75;color:#1D9E75}
.nav-mes.ativo{background:#185FA5;color:#fff;border-color:#185FA5;font-weight:600}
.nav-mes.real.ativo{background:#1D9E75;border-color:#1D9E75}
.nav-label{font-size:11px;color:#999;margin-right:4px}
.tabs{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.tab{font-size:13px;cursor:pointer;padding:6px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#666}
.tab.active{background:#eee;color:#111;font-weight:600;border-color:#bbb}
.seller-card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1rem 1.125rem;margin-bottom:1rem}
.seller-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.seller-info{flex:1;min-width:0}
.seller-name{font-size:14px;font-weight:600}
.seller-sub{font-size:12px;color:#666;margin-top:2px}
.seller-right{text-align:right;flex-shrink:0}
.seller-pct-val{font-size:18px;font-weight:600;display:block}
.seller-pct-cli{font-size:11px;color:#999}
.seller-metas{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.seller-meta-item{font-size:11px;color:#555;background:#f0f0f0;padding:3px 8px;border-radius:4px;display:flex;align-items:center;gap:4px}
.bar-bg{width:100%;height:7px;background:#eee;border-radius:4px;overflow:hidden;margin-bottom:14px}
.bar-fill{height:100%;border-radius:4px;transition:width .5s}
.client-list{display:flex;flex-direction:column;gap:7px}
.client-row{display:flex;align-items:center;gap:8px;font-size:12px}
.client-name{color:#555;width:160px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.client-bar-bg{flex:1;height:5px;background:#eee;border-radius:3px;overflow:hidden}
.client-bar-fill{height:100%;border-radius:3px}
.client-vals{display:flex;gap:6px;align-items:center;flex-shrink:0;min-width:100px;justify-content:flex-end}
.badge{display:inline-block;padding:2px 7px;border-radius:6px;font-size:11px;font-weight:600}
.badge-green{background:#EAF3DE;color:#3B6D11}
.badge-amber{background:#FAEEDA;color:#854F0B}
.badge-red{background:#FCEBEB;color:#A32D2D}
.badge-status{padding:4px 12px;font-size:13px}
.badge-proj{background:#E6F1FB;color:#0C447C;padding:2px 8px;font-size:11px;border-radius:4px;margin-left:8px}
.loading{text-align:center;padding:3rem;color:#888;font-size:14px}
.erro{text-align:center;padding:2rem;color:#c00;font-size:13px}
.rodape{margin-top:10px;font-size:11px;color:#aaa}
button.refresh{font-size:12px;padding:5px 14px;border-radius:6px;border:1px solid #ddd;background:#fff;cursor:pointer}
button.btn-proj{font-size:12px;padding:5px 14px;border-radius:6px;border:1px solid #185FA5;background:#185FA5;color:#fff;cursor:pointer;font-weight:600}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:flex-start;padding:1rem;overflow-y:auto}
.modal-overlay.aberto{display:flex}
.modal{background:#fff;border-radius:12px;padding:1.5rem;width:100%;max-width:800px;margin:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.modal-titulo{font-size:18px;font-weight:600;color:#185FA5}
.btn-fechar{font-size:20px;cursor:pointer;color:#999;background:none;border:none}
.proj-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.5rem}
.proj-card{background:#f5f5f5;border-radius:8px;padding:12px 14px}
.proj-card-label{font-size:11px;color:#666;margin-bottom:4px}
.proj-card-val{font-size:18px;font-weight:600}
.proj-card-sub{font-size:10px;color:#999;margin-top:2px}
table.proj-table{width:100%;border-collapse:collapse;font-size:13px}
table.proj-table th{background:#185FA5;color:#fff;padding:8px 10px;text-align:right;font-weight:600}
table.proj-table th:first-child{text-align:left}
table.proj-table td{padding:7px 10px;text-align:right;border-bottom:1px solid #eee}
table.proj-table td:first-child{text-align:left;font-weight:500}
table.proj-table tr.real td{color:#1D9E75}
table.proj-table tr.total-row td{font-weight:700;background:#f0f0f0;border-top:2px solid #ddd}
.acumulado-bar{margin-top:1.25rem}
.acumulado-label{font-size:12px;color:#666;margin-bottom:6px;display:flex;justify-content:space-between}
.acumulado-bg{width:100%;height:12px;background:#eee;border-radius:6px;overflow:hidden}
.acumulado-fill{height:100%;border-radius:6px;background:#1D9E75}
.edit-cell{cursor:pointer;color:#185FA5;text-decoration:underline dotted;text-underline-offset:2px}
.edit-cell:hover{background:#E6F1FB;border-radius:3px;padding:1px 3px}
</style>
</head>

</div>

function fmt(v){ return 'R$ '+Math.round(v).toLocaleString('pt-BR'); }
function fmtK(v){ return 'R$'+Math.round(v/1000)+'k'; }
function pct(v,m){ return m>0?Math.min(Math.round((v/m)*100),100):0; }
function bst(p){ return p>=100?["badge-green","Meta batida"]:p>=60?["badge-amber","Em andamento"]:["badge-red","Atencao"]; }

function parseCSV(txt){
  const rows=[];
  for(const l of txt.trim().split('\n')){
    const cols=[];let cur='',inQ=false;
    for(let i=0;i<l.length;i++){
      if(l[i]==='"'){inQ=!inQ;continue;}
      if(l[i]===','&&!inQ){cols.push(cur.trim());cur='';continue;}
      cur+=l[i];
    }
    cols.push(cur.trim());rows.push(cols);
  }
  return rows;
}

function parseVal(s){
  if(!s) return 0;
  const l=s.replace(/[R$\s]/g,'').trim();
  if(l.includes(',')&&l.includes('.')) return parseFloat(l.replace(/\./g,'').replace(',','.'))||0;
  if(l.includes(',')) return parseFloat(l.replace(',','.'))||0;
  return parseFloat(l)||0;
}

function lixo(s){
  if(!s) return true;
  const t=s.toLowerCase().trim();
  return !t||t==='vendedor'||t.includes('meta')||t.includes('preencha')||t.includes('resumo')||t.includes('gerado')||t.includes('faturamento')||t.includes('preenchida');
}

function somarLinha(linhas){
  return linhas.slice(1).reduce((s,r)=>s+(!lixo(r[0])?parseVal(r[2]||'0'):0),0);
}

function acumular(linhas,dest){
  for(let i=1;i<linhas.length;i++){
    const r=linhas[i];
    const v=(r[0]||'').trim(),c=(r[1]||'').trim(),val=parseVal(r[2]||'0');
    if(lixo(v)||lixo(c)||val<=0) continue;
    if(!dest[v]) dest[v]={clientes:{}};
    if(!dest[v].clientes[c]) dest[v].clientes[c]={vendido:0};
    dest[v].clientes[c].vendido+=val;
  }
}

async function carregar(){
  document.getElementById('conteudo').innerHTML='<div class="loading">Carregando dados...</div>';
  try{
    const [rJ,rF,rM,rA,rMt]=await Promise.all([
      fetch(URL_JAN).then(r=>r.text()),
      fetch(URL_FEV).then(r=>r.text()),
      fetch(URL_MAR).then(r=>r.text()),
      fetch(URL_ABR).then(r=>r.text()),
      fetch(URL_METAS).then(r=>r.text()),
    ]);
    const lJ=parseCSV(rJ),lF=parseCSV(rF),lM=parseCSV(rM),lA=parseCSV(rA);
    realMes[1]=somarLinha(lJ);
    realMes[2]=somarLinha(lF);
    realMes[3]=somarLinha(lM);
    realMes[4]=somarLinha(lA);

    const mObj={};
    for(const r of parseCSV(rMt)){
      const v=(r[0]||'').trim(),c=(r[1]||'').trim(),mt=parseVal(r[2]||'0');
      if(lixo(v)||lixo(c)||mt<=0) continue;
      if(!mObj[v]) mObj[v]={clientes:{}};
      if(!mObj[v].clientes[c]) mObj[v].clientes[c]={meta:0};
      mObj[v].clientes[c].meta+=mt;
    }

    window._dMes={};
    for(const [m,lin] of [[1,lJ],[2,lF],[3,lM],[4,lA]]){
      window._dMes[m]={};
      acumular(lin,window._dMes[m]);
    }
    const dAno={};
    for(const lin of [lJ,lF,lM,lA]) acumular(lin,dAno);
    window._mObj=mObj;
    window._dAno=dAno;

    const vs=new Set([...Object.keys(dAno),...Object.keys(mObj)]);
    window._vl=[...vs].filter(v=>!lixo(v)).map(nome=>{
      const cs=new Set([...Object.keys((dAno[nome]||{}).clientes||{}),...Object.keys((mObj[nome]||{}).clientes||{})]);
      return{nome,clientes:[...cs].map(cn=>({
        nome:cn,
        vAno:((dAno[nome]||{}).clientes||{})[cn]?.vendido||0,
        meta:((mObj[nome]||{}).clientes||{})[cn]?.meta||0,
      })).sort((a,b)=>b.meta-a.meta)};
    }).filter(v=>v.clientes.length>0);

    render();
    const ag=new Date();
    document.getElementById('atualizado').textContent="Atualizado as "+ag.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }catch(e){
    document.getElementById('conteudo').innerHTML='<div class="erro">Erro ao carregar.<br>'+e.message+'</div>';
  }
}

    } else {
      const dv=(dMs[v.nome]||{}).clientes||{};
      const cm=METAS_FUTURAS[mK]?.[v.nome]||{};
      const todos=new Set([...Object.keys(dv),...Object.keys(cm),...v.clientes.map(c=>c.nome)]);
      const arr=[...todos].map(cn=>({nome:cn,vendido:dv[cn]?.vendido||0,meta:v.clientes.find(c=>c.nome===cn)?.meta||cm[cn]||0})).sort((a,b)=>b.meta-a.meta);
      vtv=arr.reduce((s,c)=>s+c.vendido,0);
      vatend=arr.filter(c=>c.vendido>0).length;
      rows=arr.map(cl=>{
        const semMeta=cl.meta===0&&cl.vendido>0;
        const cp=semMeta?100:pct(cl.vendido,cl.meta);
        const[cb,cbt]=semMeta?['badge-amber','Sem meta']:bst(cp);
        const barColor=semMeta?'#BA7517':c.bar;
        return `<div class="client-row" style="${cl.vendido===0?'opacity:0.4':''}">
          <span class="client-name">${cl.nome}</span>
          <div class="client-bar-bg"><div class="client-bar-fill" style="width:${semMeta?60:cp}%;background:${barColor}"></div></div>
          <div class="client-vals">
            <span style="font-weight:600;min-width:34px;text-align:right;color:${semMeta?'#BA7517':'inherit'}">${semMeta?'—':cp+'%'}</span>
            <span style="color:#999;font-size:11px">${fmt(cl.vendido)}${semMeta?' vendido':' / '+fmt(cl.meta)}</span>
            <span class="badge ${cb}" style="font-size:10px;padding:1px 6px">${cbt}</span>
          </div></div>`;
      }).join('');
    }

    const tp=modoAno?pct(vtv,v.clientes.reduce((s,cl)=>s+cl.meta,0)):pct(vtv,mm);
    const pCli=pct(vatend,mCli);

    h+=`<div class="seller-card">
      <div class="seller-header">
        <div class="avatar" style="background:${c.bg};color:${c.text}">${ini}</div>
        <div class="seller-info">
          <div class="seller-name">${v.nome}</div>
          <div class="seller-sub">${futuro?fmt(mm)+' projetado':fmt(vtv)+' '+(modoAno?'no ano':"este mes")} · ${futuro?'—':vatend+' clientes'}</div>
        </div>
        <div class="seller-right">
          <span class="seller-pct-val" style="color:${c.bar}">${futuro?'—':tp+'%'}</span>
          <span class="seller-pct-cli">${futuro?fmt(mm)+' meta':vatend+'/'+mCli+' ('+pCli+'%)'}</span>
        </div>
      </div>
      <div class="seller-metas">
        <div class="seller-meta-item">Meta mês: ${fmt(mm)} <span class="edit-link" onclick="tg('mv${idV}')">editar</span></div>
        <div class="seller-meta-item">Meta clientes: ${mCli} <span class="edit-link" onclick="tg('mc${idV}')">editar</span></div>
      </div>
      <div class="inline-edit" id="mv${idV}" style="margin-bottom:8px">
        <input type="number" id="iv${idV}" value="${mVen}" step="1000" style="width:120px">
        <button onclick="svV('iv${idV}','${v.nome}')">OK</button>
        <button class="cancel" onclick="tg('mv${idV}')">X</button>
      </div>
      <div class="inline-edit" id="mc${idV}" style="margin-bottom:8px">
        <input type="number" id="ic${idV}" value="${mCli}" min="1">
        <button onclick="svC('ic${idV}','${v.nome}')">OK</button>
        <button class="cancel" onclick="tg('mc${idV}')">X</button>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${futuro?100:tp}%;background:${futuro?c.bg:c.bar}"></div></div>
      <div class="client-list">${rows}</div>
    </div>`;
  });

  document.getElementById('conteudo').innerHTML=h;
  if(modoAno) renderG();
}

function renderG(){
  if(_chart){_chart.destroy();_chart=null;}
  const canvas=document.getElementById('chartAnual');
  if(!canvas) return;
  _chart=new Chart(canvas,{
    type:'bar',
    data:{labels:MESES,datasets:[
      {label:'Meta',data:MESES.map((_,i)=>MA[i+1].total),backgroundColor:'rgba(24,95,165,0.18)',borderColor:'#185FA5',borderWidth:1.5,borderRadius:4},
      {label:'Realizado',data:MESES.map((_,i)=>realMes[i+1]>0?realMes[i+1]:null),backgroundColor:'rgba(29,158,117,0.75)',borderColor:'#1D9E75',borderWidth:1.5,borderRadius:4}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': R$ '+Math.round(ctx.raw||0).toLocaleString('pt-BR')}}},
      scales:{x:{ticks:{autoSkip:false,font:{size:11}},grid:{display:false}},y:{ticks:{font:{size:11},callback:v=>fmtK(v)},grid:{color:'rgba(0,0,0,0.06)'}}}
    }
  });
}

function setAba(i,btn){
  abaAtiva=i;
  if(i!==-1&&!MESES_REAIS.includes(mesSel)) mesSel=MES_ATUAL;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(btn) btn.classList.add('active');
  render();
}

function selMes(m){mesSel=m;render();}
function tg(id){const el=document.getElementById(id);if(el)el.classList.toggle('ativo');}

function svV(inputId,nome){
  const el=document.getElementById(inputId);
  if(!el) return;
  const val=parseFloat(el.value)||0;
  if(val>0){
    MV[nome]=val;
    // Se for vendedor específico, atualizar também MA do mês atual
    const vkMap={'Bruno Braga':'bb','Cauan':'ca','Luiz':'lu'};
    if(vkMap[nome]){MA[MES_ATUAL][vkMap[nome]]=val;MA[MES_ATUAL].total=MA[MES_ATUAL].bb+MA[MES_ATUAL].ca+MA[MES_ATUAL].lu;}
    render();
  }
}

function svC(inputId,nome){
  const el=document.getElementById(inputId);
  if(!el) return;
  const val=parseInt(el.value)||0;
  if(val>0){MC[nome]=val;render();}
}

function abrirProjecao(){
  renderProjecao();
  document.getElementById('modalProj').classList.add('aberto');
}

function renderProjecao(){
  const totBB=Object.values(MA).reduce((s,m)=>s+m.bb,0);
  const totCA=Object.values(MA).reduce((s,m)=>s+m.ca,0);
  const totLU=Object.values(MA).reduce((s,m)=>s+m.lu,0);
  const tot=totBB+totCA+totLU;
  const acum=Object.entries(MA).filter(([m])=>parseInt(m)<=MES_ATUAL).reduce((s,[,m])=>s+m.total,0);
  const pa=Math.round((acum/tot)*100);

  let h=`<div class="proj-cards">
    <div class="proj-card"><div class="proj-card-label">Meta anual</div><div class="proj-card-val">${fmt(tot)}</div></div>
    <div class="proj-card"><div class="proj-card-label">Bruno Braga</div><div class="proj-card-val">${fmt(totBB)}</div><div class="proj-card-sub">45%</div></div>
    <div class="proj-card"><div class="proj-card-label">Cauan</div><div class="proj-card-val">${fmt(totCA)}</div><div class="proj-card-sub">30%</div></div>
    <div class="proj-card"><div class="proj-card-label">Luiz</div><div class="proj-card-val">${fmt(totLU)}</div><div class="proj-card-sub">25%</div></div>
  </div>
  <p style="font-size:12px;color:#888;margin-bottom:8px">Clique em qualquer valor para editar a meta do mês.</p>
  <table class="proj-table"><thead><tr><th>Mês</th><th>Bruno Braga</th><th>Cauan</th><th>Luiz</th><th>Total</th></tr></thead><tbody>`;

  for(let m=1;m<=12;m++){
    const d=MA[m];
    const r=realMes[m]>0?realMes[m]:null;

    const celBB = `<span class="edit-cell" onclick="editarMeta(${m},'bb',this)">${fmt(d.bb)}</span>`;
    const celCA = `<span class="edit-cell" onclick="editarMeta(${m},'ca',this)">${fmt(d.ca)}</span>`;
    const celLU = `<span class="edit-cell" onclick="editarMeta(${m},'lu',this)">${fmt(d.lu)}</span>`;
    const totalMes = d.bb + d.ca + d.lu;
    const isReal = d.tipo==='real';

    h+=`<tr class="${isReal?'real':''}">
      <td>${isReal?'✓ ':''} ${MESES[m-1]}</td>
      <td id="cel-bb-${m}">${celBB}</td>
      <td id="cel-ca-${m}">${celCA}</td>
      <td id="cel-lu-${m}">${celLU}</td>
      <td><strong>${r?fmt(r)+' <small style="color:#999">/ '+fmt(totalMes)+'</small>':fmt(totalMes)}</strong></td>
    </tr>`;
  }

  const totBB2=Object.values(MA).reduce((s,m)=>s+m.bb,0);
  const totCA2=Object.values(MA).reduce((s,m)=>s+m.ca,0);
  const totLU2=Object.values(MA).reduce((s,m)=>s+m.lu,0);

  h+=`</tbody><tfoot><tr class="total-row"><td>Total</td><td>${fmt(totBB2)}</td><td>${fmt(totCA2)}</td><td>${fmt(totLU2)}</td><td>${fmt(totBB2+totCA2+totLU2)}</td></tr></tfoot></table>
  <div class="acumulado-bar">
    <div class="acumulado-label"><span>Progresso no ano</span><span>${pa}% — ${fmt(acum)} de ${fmt(tot)}</span></div>
    <div class="acumulado-bg"><div class="acumulado-fill" style="width:${pa}%"></div></div>
  </div>`;

  document.getElementById('modal-conteudo').innerHTML=h;
}

function editarMeta(mes, vend, el){
  const celId = 'cel-'+vend+'-'+mes;
  const valorAtual = MA[mes][vend];
  const cel = document.getElementById(celId);
  cel.innerHTML = `<div style="display:flex;gap:4px;align-items:center">
    <input type="number" id="inp-${vend}-${mes}" value="${valorAtual}" step="1000" style="width:90px;font-size:12px;padding:2px 5px;border:1px solid #ccc;border-radius:4px">
    <button onclick="salvarMetaMes(${mes},'${vend}')" style="font-size:11px;padding:2px 8px;border-radius:4px;border:none;background:#185FA5;color:#fff;cursor:pointer">OK</button>
    <button onclick="renderProjecao()" style="font-size:11px;padding:2px 6px;border-radius:4px;border:none;background:#ccc;color:#333;cursor:pointer">X</button>
  </div>`;
  document.getElementById('inp-'+vend+'-'+mes).focus();
}

function salvarMetaMes(mes, vend){
  const inp = document.getElementById('inp-'+vend+'-'+mes);
  if(!inp) return;
  const val = parseFloat(inp.value)||0;
  if(val>0){
    MA[mes][vend] = val;
    MA[mes].total = MA[mes].bb + MA[mes].ca + MA[mes].lu;
    // Atualizar meta mensal do vendedor para o mês atual
    if(mes === MES_ATUAL){
      const nomeMap = {bb:'Bruno Braga', ca:'Cauan', lu:'Luiz'};
      MV[nomeMap[vend]] = val;
    }
    renderProjecao();
    render();
  }
}

function fecharProjecao(){document.getElementById('modalProj').classList.remove('aberto');}
document.getElementById('modalProj').addEventListener('click',function(e){if(e.target===this)fecharProjecao();});

carregar();
</script>
</body>
</html>
