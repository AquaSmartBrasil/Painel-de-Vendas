<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Comercial — AquaSmart</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f2f5;color:#1a1a1a;min-height:100vh}
.header{background:#185FA5;color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.header-titulo{font-size:18px;font-weight:700;letter-spacing:0.5px}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.btn{font-size:12px;padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-weight:600}
.btn-login{background:#fff;color:#185FA5}
.btn-atualizar{background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.4)}
.badge-auth{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:600}
.auth-ok{background:#1D9E75;color:#fff}
.auth-no{background:#E24B4A;color:#fff}
.nav{background:#fff;border-bottom:1px solid #e0e0e0;padding:0 20px;display:flex;gap:0;overflow-x:auto}
.nav-tab{font-size:13px;padding:12px 18px;cursor:pointer;border-bottom:3px solid transparent;color:#666;white-space:nowrap;font-weight:500}
.nav-tab.active{color:#185FA5;border-bottom-color:#185FA5;font-weight:700}
.main{padding:16px 20px;max-width:1400px;margin:0 auto}
.periodo-bar{background:#fff;border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border:1px solid #e0e0e0}
.periodo-label{font-size:12px;color:#666;font-weight:600}
.periodo-btn{font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid #ddd;background:#fff;cursor:pointer;color:#555}
.periodo-btn.active{background:#185FA5;color:#fff;border-color:#185FA5}
.periodo-custom{display:flex;gap:6px;align-items:center;font-size:12px;color:#666}
.periodo-custom input{font-size:12px;padding:4px 8px;border:1px solid #ddd;border-radius:4px;width:110px}
.resumo-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.rcard{background:#fff;border-radius:10px;padding:14px 16px;border:1px solid #e0e0e0}
.rcard-label{font-size:11px;color:#888;margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px}
.rcard-val{font-size:22px;font-weight:700;color:#1a1a1a}
.rcard-sub{font-size:11px;color:#999;margin-top:4px}
.rcard-prog{height:5px;background:#eee;border-radius:3px;overflow:hidden;margin-top:8px}
.rcard-prog-fill{height:100%;border-radius:3px;transition:width .5s}
.secao{background:#fff;border-radius:10px;border:1px solid #e0e0e0;margin-bottom:16px;overflow:hidden}
.secao-header{padding:14px 18px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.secao-titulo{font-size:14px;font-weight:700;color:#1a1a1a}
.secao-sub{font-size:12px;color:#888}
.vendedor-tabs{display:flex;gap:6px;padding:12px 18px 0;flex-wrap:wrap}
.vtab{font-size:12px;padding:5px 14px;border-radius:6px;border:1px solid #ddd;background:#f8f8f8;cursor:pointer;color:#666}
.vtab.active{background:#185FA5;color:#fff;border-color:#185FA5;font-weight:600}
.vendedor-content{padding:14px 18px}
.pilar-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:14px}
.pilar{border-radius:8px;padding:14px;border:1px solid #e8e8e8}
.pilar-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.pilar-nome{font-size:12px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:0.4px}
.pilar-pct{font-size:20px;font-weight:700}
.pilar-nums{font-size:12px;color:#777;margin-bottom:8px}
.pilar-bar{height:8px;background:#eee;border-radius:4px;overflow:hidden}
.pilar-bar-fill{height:100%;border-radius:4px;transition:width .5s}
.pilar-meta-edit{font-size:10px;color:#185FA5;cursor:pointer;margin-top:4px;display:inline-block}
.meta-edit-wrap{display:none;margin-top:6px;gap:4px;align-items:center}
.meta-edit-wrap.show{display:flex}
.meta-edit-wrap input{width:110px;font-size:12px;padding:3px 6px;border:1px solid #185FA5;border-radius:4px}
.meta-edit-wrap button{font-size:11px;padding:3px 8px;border-radius:4px;border:none;background:#185FA5;color:#fff;cursor:pointer}
.meta-edit-wrap button.cx{background:#ccc;color:#333}
.clientes-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.clientes-table th{background:#f5f5f5;padding:7px 10px;text-align:left;font-weight:600;color:#555;border-bottom:1px solid #eee}
.clientes-table th:not(:first-child){text-align:right}
.clientes-table td{padding:6px 10px;border-bottom:1px solid #f8f8f8;color:#444}
.clientes-table td:not(:first-child){text-align:right}
.clientes-table tr:hover td{background:#fafafa}
.cli-bar-wrap{display:flex;align-items:center;gap:6px}
.cli-bar-bg{flex:1;height:4px;background:#eee;border-radius:2px;overflow:hidden;min-width:40px}
.cli-bar-f{height:100%;border-radius:2px}
.badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600}
.bg{background:#EAF3DE;color:#3B6D11}
.ba{background:#FAEEDA;color:#854F0B}
.br{background:#FCEBEB;color:#A32D2D}
.bw{background:#E6F1FB;color:#0C447C}
.loading{text-align:center;padding:3rem;color:#888;font-size:14px}
.erro{text-align:center;padding:2rem;color:#c00;font-size:13px;background:#fff8f8;border-radius:8px}
.nologin{text-align:center;padding:3rem}
.nologin h3{color:#185FA5;margin-bottom:8px}
.nologin p{color:#888;font-size:13px;margin-bottom:16px}
.btn-grande{font-size:14px;padding:10px 24px;border-radius:8px;border:none;cursor:pointer;font-weight:600;background:#185FA5;color:#fff}
.rodape{text-align:center;font-size:11px;color:#aaa;padding:12px}
.sem-meta{color:#BA7517;font-style:italic}
.novo-cliente{background:#E6F1FB;color:#0C447C;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;margin-left:4px}
</style>
</head>
<body>

<div class="header">
  <span class="header-titulo">Dashboard Comercial — AquaSmart</span>
  <div class="header-right">
    <span class="badge-auth auth-no" id="badge-auth">Desconectado</span>
    <button class="btn btn-login" id="btn-login" onclick="fazerLogin()">Conectar Conta Azul</button>
    <button class="btn btn-atualizar" onclick="carregar()">Atualizar</button>
    <span style="font-size:11px;color:rgba(255,255,255,0.7)" id="ultima-atualizacao"></span>
  </div>
</div>

<div class="nav">
  <div class="nav-tab active" onclick="setSecao('geral',this)">Visão Geral</div>
  <div class="nav-tab" onclick="setSecao('vendedores',this)">Por Vendedor</div>
  <div class="nav-tab" onclick="setSecao('clientes',this)">Por Cliente</div>
  <div class="nav-tab" onclick="setSecao('metas',this)">Configurar Metas</div>
</div>

<div class="main">
  <div class="periodo-bar">
    <span class="periodo-label">Período:</span>
    <button class="periodo-btn active" onclick="setPeriodo('mes',this)">Este mês</button>
    <button class="periodo-btn" onclick="setPeriodo('trimestre',this)">Trimestre</button>
    <button class="periodo-btn" onclick="setPeriodo('ano',this)">Este ano</button>
    <div class="periodo-custom">
      <span>De</span>
      <input type="date" id="dt-inicio">
      <span>até</span>
      <input type="date" id="dt-fim">
      <button class="periodo-btn" onclick="setPeriodo('custom',this)">Aplicar</button>
    </div>
  </div>

  <div id="conteudo"><div class="loading">Conecte o Conta Azul para ver os dados em tempo real.</div></div>
</div>

<div class="rodape" id="rodape"></div>

function fmt(v){return 'R$ '+Math.round(v).toLocaleString('pt-BR');}

function pct(v,m){return m>0?Math.min(Math.round((v/m)*100),100):0;}

function getDatas(){
  const hoje = new Date();
  const ano = hoje.getFullYear();
  const mes = String(hoje.getMonth()+1).padStart(2,'0');
  const dia = String(hoje.getDate()).padStart(2,'0');

  if(periodoAtivo==='mes'){
    return {inicio:`${ano}-${mes}-01`, fim:`${ano}-${mes}-${dia}`};
  } else if(periodoAtivo==='trimestre'){
    const m = hoje.getMonth();
    const inicioTri = new Date(ano, Math.floor(m/3)*3, 1);
    return {
      inicio:`${inicioTri.getFullYear()}-${String(inicioTri.getMonth()+1).padStart(2,'0')}-01`,
      fim:`${ano}-${mes}-${dia}`
    };
  } else if(periodoAtivo==='ano'){
    return {inicio:`${ano}-01-01`, fim:`${ano}-${mes}-${dia}`};
  } else {
    return {
      inicio: document.getElementById('dt-inicio').value,
      fim: document.getElementById('dt-fim').value
    };
  }
}

async function verificarAuth(){
  try{
    const r = await fetch(`${WORKER}/status`);
    const d = await r.json();
    autenticado = d.autenticado;
    atualizarBadgeAuth();
    return autenticado;
  }catch(e){
    autenticado = false;
    atualizarBadgeAuth();
    return false;
  }
}

function atualizarBadgeAuth(){
  const b = document.getElementById('badge-auth');
  const btn = document.getElementById('btn-login');
  if(autenticado){
    b.className='badge-auth auth-ok'; b.textContent='Conectado';
    btn.textContent='Reconectar';
  } else {
    b.className='badge-auth auth-no'; b.textContent='Desconectado';
    btn.textContent='Conectar Conta Azul';
  }
}

async function fazerLogin(){
  try{
    const r = await fetch(`${WORKER}/auth-url`);
    const d = await r.json();
    window.open(d.url,'_blank','width=600,height=700');
  }catch(e){
    alert('Erro ao obter URL de login: '+e.message);
  }
}

async function carregar(){
  const ok = await verificarAuth();
  if(!ok){
    document.getElementById('conteudo').innerHTML=`<div class="nologin">
      <h3>Conecte o Conta Azul</h3>
      <p>Clique no botão abaixo para autorizar o acesso aos dados de vendas em tempo real.</p>
      <button class="btn-grande" onclick="fazerLogin()">Conectar Conta Azul</button>
    </div>`;
    return;
  }

  document.getElementById('conteudo').innerHTML='<div class="loading">Carregando dados do Conta Azul...</div>';

  try{
    const {inicio,fim} = getDatas();
    const r = await fetch(`${WORKER}/vendas?inicio=${inicio}&fim=${fim}`);
    const d = await r.json();

    if(d.error){
      if(d.error.includes('autenticado')||d.error.includes('Token')){
        autenticado=false; atualizarBadgeAuth();
        document.getElementById('conteudo').innerHTML=`<div class="nologin">
          <h3>Sessão expirada</h3><p>Reconecte o Conta Azul para continuar.</p>
          <button class="btn-grande" onclick="fazerLogin()">Reconectar</button>
        </div>`;
        return;
      }
      throw new Error(d.error);
    }

    dadosVendas = d.vendas || [];
    const agora = new Date();
    document.getElementById('ultima-atualizacao').textContent =
      'Atualizado às '+agora.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('rodape').textContent =
      dadosVendas.length+' vendas carregadas do Conta Azul';

    renderSecao();
  }catch(e){
    document.getElementById('conteudo').innerHTML=`<div class="erro">Erro ao carregar: ${e.message}</div>`;
  }
}

  VENDEDORES.forEach(v=>{res[v]={valor:0,itens:0,clientes:new Set(),vendas:[]};});

  vendas.forEach(venda=>{
    const v = venda.seller?.name || venda.vendedor || '';
    const cli = venda.customer?.name || venda.cliente || venda.customer_name || '';
    const valor = parseFloat(venda.net_value||venda.valor_liquido||venda.value||0);
    const itens = (venda.items||[]).reduce((s,i)=>s+(parseFloat(i.quantity)||0),0) || parseFloat(venda.quantidade_itens||0);

    if(res[v]){
      res[v].valor+=valor;
      res[v].itens+=itens;
      if(cli) res[v].clientes.add(cli);
      res[v].vendas.push({cli,valor,itens,data:venda.emission||venda.data});
    }
  });

  // Converter Set para tamanho
  VENDEDORES.forEach(v=>{
    res[v].num_clientes=res[v].clientes.size;
  });

  return res;
}

function renderSecao(){
  if(secaoAtiva==='geral') renderGeral();
  else if(secaoAtiva==='vendedores') renderVendedores();
  else if(secaoAtiva==='clientes') renderClientes();
  else if(secaoAtiva==='metas') renderMetas();
}

function renderGeral(){
  const agg = processarVendas(dadosVendas);
  const totalValor = VENDEDORES.reduce((s,v)=>s+agg[v].valor,0);
  const totalItens = VENDEDORES.reduce((s,v)=>s+agg[v].itens,0);
  const totalClientes = new Set(dadosVendas.map(vd=>vd.customer?.name||vd.cliente||'').filter(Boolean)).size;
  const metaTotalValor = VENDEDORES.reduce((s,v)=>s+METAS[v].valor,0);
  const metaTotalItens = VENDEDORES.reduce((s,v)=>s+METAS[v].itens,0);

      <div class="rcard-prog"><div class="rcard-prog-fill" style="width:${pct(totalValor,metaTotalValor)}%;background:#378ADD"></div></div>
    </div>
    <div class="rcard">

      <div class="rcard-sub">Meta: ${fmtN(metaTotalItens)} (${pct(totalItens,metaTotalItens)}%)</div>
      <div class="rcard-prog"><div class="rcard-prog-fill" style="width:${pct(totalItens,metaTotalItens)}%;background:#1D9E75"></div></div>
    </div>
    <div class="rcard">
      <div class="rcard-label">Clientes atendidos</div>
      <div class="rcard-val">${fmtN(totalClientes)}</div>
      <div class="rcard-sub">Meta: ${fmtN(metaTotalCli)} (${pct(totalClientes,metaTotalCli)}%)</div>
      <div class="rcard-prog"><div class="rcard-prog-fill" style="width:${pct(totalClientes,metaTotalCli)}%;background:#7F77DD"></div></div>
    </div>
    <div class="rcard">
      <div class="rcard-label">Total de vendas</div>
      <div class="rcard-val">${dadosVendas.length}</div>
      <div class="rcard-sub">pedidos no período</div>

  </div>`;

  // Cards por vendedor

  h+=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px">`;

  VENDEDORES.forEach(v=>{

    const pv=pct(a.valor,m.valor),pi=pct(a.itens,m.itens),pc=pct(a.num_clientes,m.clientes);
    const ini=v.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();
    h+=`<div style="background:${c.bg};border-radius:10px;padding:14px;border:1px solid ${c.bar}22">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <div style="width:36px;height:36px;border-radius:50%;background:${c.bar};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px">${ini}</div>
        <div>
          <div style="font-weight:700;font-size:14px;color:${c.text}">${v}</div>
          <div style="font-size:11px;color:${c.text};opacity:0.7">${a.num_clientes} clientes atendidos</div>
        </div>
      </div>
      <div class="pilar-grid" style="grid-template-columns:1fr 1fr 1fr;gap:8px">
        <div style="background:rgba(255,255,255,0.7);border-radius:6px;padding:8px">
          <div style="font-size:10px;color:#666;font-weight:600;margin-bottom:4px">FATURAMENTO</div>
          <div style="font-size:15px;font-weight:700;color:${c.text}">${pv}%</div>
          <div style="font-size:10px;color:#888">${fmt(a.valor)}</div>

        </div>
        <div style="background:rgba(255,255,255,0.7);border-radius:6px;padding:8px">
          <div style="font-size:10px;color:#666;font-weight:600;margin-bottom:4px">ITENS</div>
          <div style="font-size:15px;font-weight:700;color:${c.text}">${pi}%</div>
          <div style="font-size:10px;color:#888">${fmtN(a.itens)} itens</div>
          <div style="height:4px;background:#ddd;border-radius:2px;margin-top:4px;overflow:hidden"><div style="height:100%;width:${pi}%;background:${c.bar};border-radius:2px"></div></div>

          <div style="height:4px;background:#ddd;border-radius:2px;margin-top:4px;overflow:hidden"><div style="height:100%;width:${pc}%;background:${c.bar};border-radius:2px"></div></div>

  h+=`</div></div></div>`;

function renderVendedores(){
  const agg = processarVendas(dadosVendas);
  const c = CORES[vendedorAtivo];
  const a = agg[vendedorAtivo];
  const m = METAS[vendedorAtivo];
  const prop = CLI_PROP[vendedorAtivo]||{};

  // Agregar clientes do vendedor
  const cliMap = {};
  dadosVendas.forEach(venda=>{
    const v=venda.seller?.name||venda.vendedor||'';
    if(v!==vendedorAtivo) return;
    const cli=venda.customer?.name||venda.cliente||'';
    const valor=parseFloat(venda.net_value||venda.valor_liquido||venda.value||0);
    const itens=(venda.items||[]).reduce((s,i)=>s+(parseFloat(i.quantity)||0),0)||parseFloat(venda.quantidade_itens||0);
    if(!cli) return;
    if(!cliMap[cli]) cliMap[cli]={valor:0,itens:0};
    cliMap[cli].valor+=valor;
    cliMap[cli].itens+=itens;
  });

  // Calcular metas por cliente baseadas na proporção histórica
  const mediaValorCli = m.valor / Math.max(Object.keys(prop).length,1);
  const mediaItensCli = m.itens / Math.max(Object.keys(prop).length,1);

  // Combinar clientes com vendas + clientes da carteira histórica
  const todosCli = new Set([...Object.keys(cliMap),...Object.keys(prop)]);
  const cliArr = [...todosCli].map(cli=>{
    const p = prop[cli];
    const metaV = p ? m.valor*p.pv : mediaValorCli;
    const metaI = p ? m.itens*p.pi : mediaItensCli;
    const novo = !p;
    return {
      nome:cli,
      valor:cliMap[cli]?.valor||0,
      itens:cliMap[cli]?.itens||0,
      metaV, metaI, novo
    };
  }).sort((a,b)=>b.metaV-a.metaV);

  const pv=pct(a.valor,m.valor);
  const pi=pct(a.itens,m.itens);
  const pc=pct(a.num_clientes,m.clientes);

  let h=`<div class="vendedor-tabs">`;
  VENDEDORES.forEach(v=>{
    h+=`<button class="vtab${v===vendedorAtivo?' active':''}" onclick="setVendedor('${v}')">${v.split(' ')[0]}</button>`;
  });
  h+=`</div><div class="vendedor-content">`;

  // 3 pilares
  h+=`<div class="pilar-grid">`;
  const pilares=[
    {nome:'Faturamento',val:fmt(a.valor),meta:fmt(m.valor),p:pv,bar:c.bar,pilar:'valor',unid:'R$'},
    {nome:'Itens vendidos',val:fmtN(a.itens)+' itens',meta:fmtN(m.itens)+' itens',p:pi,bar:c.bar,pilar:'itens',unid:'itens'},
    {nome:'Clientes atendidos',val:a.num_clientes+' clientes',meta:m.clientes+' clientes',p:pc,bar:c.bar,pilar:'clientes',unid:'clientes'},
  ];
  pilares.forEach(pl=>{
    const id='pl-'+vendedorAtivo.replace(/ /g,'')+'-'+pl.pilar;
    h+=`<div class="pilar" style="background:${c.bg};border-color:${c.bar}33">
      <div class="pilar-header">
        <span class="pilar-nome">${pl.nome}</span>
        <span class="pilar-pct" style="color:${c.bar}">${pl.p}%</span>
      </div>
      <div class="pilar-nums">${pl.val} <span style="color:#aaa">/ meta ${pl.meta}</span></div>
      <div class="pilar-bar"><div class="pilar-bar-fill" style="width:${pl.p}%;background:${c.bar}"></div></div>
      <span class="pilar-meta-edit" onclick="toggleMetaEdit('${id}')">editar meta</span>
      <div class="meta-edit-wrap" id="${id}">
        <input type="number" id="inp-${id}" value="${METAS[vendedorAtivo][pl.pilar]}" step="${pl.pilar==='valor'?1000:1}" style="width:120px">
        <button onclick="salvarMeta('${vendedorAtivo}','${pl.pilar}','${id}')">OK</button>
        <button class="cx" onclick="toggleMetaEdit('${id}')">X</button>
      </div>
    </div>`;
  });
  h+=`</div>`;

  // Tabela de clientes
  h+=`<div style="font-size:13px;font-weight:700;color:#333;margin-bottom:8px">
    Clientes — ${cliArr.length} na carteira, ${a.num_clientes} atendidos
  </div>
  <div style="overflow-x:auto">
  <table class="clientes-table">
    <thead><tr>
      <th>Cliente</th>
      <th>Faturamento</th>
      <th>Meta fat.</th>
      <th>% Fat.</th>
      <th>Itens</th>
      <th>Meta itens</th>
      <th>% Itens</th>
      <th>Status</th>
    </tr></thead>
    <tbody>`;

  cliArr.forEach(cl=>{
    const pv2=cl.valor>0?pct(cl.valor,cl.metaV):0;
    const pi2=cl.itens>0?pct(cl.itens,cl.metaI):0;
    const temVenda=cl.valor>0;
    const status=!temVenda?'br':(pv2>=100?'bg':pv2>=60?'ba':'br');
    const statusTxt=!temVenda?'Sem venda':(pv2>=100?'Meta batida':pv2>=60?'Em andamento':'Atenção');
    h+=`<tr style="${!temVenda?'opacity:0.5':''}">
      <td>${cl.nome}${cl.novo?'<span class="novo-cliente">novo</span>':''}</td>
      <td>${temVenda?fmt(cl.valor):'—'}</td>
      <td>${fmt(cl.metaV)}</td>
      <td>
        <div class="cli-bar-wrap">
          <div class="cli-bar-bg"><div class="cli-bar-f" style="width:${pv2}%;background:${c.bar}"></div></div>
          <span style="min-width:30px;text-align:right;font-weight:600">${pv2}%</span>
        </div>
      </td>
      <td>${temVenda?fmtN(cl.itens):'—'}</td>
      <td>${fmtN(cl.metaI)}</td>
      <td>
        <div class="cli-bar-wrap">
          <div class="cli-bar-bg"><div class="cli-bar-f" style="width:${pi2}%;background:${c.bar}"></div></div>
          <span style="min-width:30px;text-align:right;font-weight:600">${pi2}%</span>
        </div>
      </td>
      <td><span class="badge ${status}">${statusTxt}</span></td>
    </tr>`;
  });

  h+=`</tbody></table></div></div>`;
  document.getElementById('conteudo').innerHTML=h;
}

function renderClientes(){
  // Visão geral de todos os clientes
  const cliMap={};
  dadosVendas.forEach(venda=>{
    const cli=venda.customer?.name||venda.cliente||'';
    const v=venda.seller?.name||venda.vendedor||'';
    const valor=parseFloat(venda.net_value||venda.valor_liquido||venda.value||0);
    const itens=(venda.items||[]).reduce((s,i)=>s+(parseFloat(i.quantity)||0),0)||parseFloat(venda.quantidade_itens||0);
    if(!cli) return;
    if(!cliMap[cli]) cliMap[cli]={valor:0,itens:0,vendedor:v};
    cliMap[cli].valor+=valor;
    cliMap[cli].itens+=itens;
  });

  const cliArr=Object.entries(cliMap).sort((a,b)=>b[1].valor-a[1].valor);

  let h=`<div class="secao">
    <div class="secao-header"><span class="secao-titulo">Todos os clientes atendidos</span><span class="secao-sub">${cliArr.length} clientes no período</span></div>
    <div style="padding:14px 18px;overflow-x:auto">
    <table class="clientes-table">
      <thead><tr><th>Cliente</th><th>Vendedor</th><th>Faturamento</th><th>Itens</th></tr></thead>
      <tbody>`;

  cliArr.forEach(([cli,d])=>{
    const c=CORES[d.vendedor]||{bar:'#888'};
    h+=`<tr>
      <td>${cli}</td>
      <td><span style="background:${c.bar}22;color:${c.bar};padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600">${d.vendedor||'—'}</span></td>
      <td>${fmt(d.valor)}</td>
      <td>${fmtN(d.itens)}</td>
    </tr>`;
  });

  h+=`</tbody></table></div></div>`;
  document.getElementById('conteudo').innerHTML=h;
}

function renderMetas(){
  let h=`<div class="secao"><div class="secao-header"><span class="secao-titulo">Configurar metas mensais</span><span class="secao-sub">Ajuste e distribui automaticamente por cliente</span></div><div style="padding:14px 18px">`;
  h+=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px">`;

  VENDEDORES.forEach(v=>{
    const c=CORES[v], m=METAS[v];
    const idV=v.replace(/ /g,'');
    h+=`<div style="border:1px solid ${c.bar}44;border-radius:10px;padding:16px;background:${c.bg}">
      <div style="font-weight:700;font-size:14px;color:${c.text};margin-bottom:14px">${v}</div>

      <div style="margin-bottom:12px">
        <label style="font-size:11px;font-weight:700;color:#666;display:block;margin-bottom:4px">META DE FATURAMENTO (R$)</label>
        <div style="display:flex;gap:6px">
          <input type="number" id="m-valor-${idV}" value="${m.valor}" step="1000"
            style="flex:1;font-size:13px;padding:6px 8px;border:1px solid ${c.bar}66;border-radius:6px">
          <button onclick="salvarMetaDireta('${v}','valor','m-valor-${idV}')"
            style="font-size:12px;padding:6px 12px;border-radius:6px;border:none;background:${c.bar};color:#fff;cursor:pointer;font-weight:600">OK</button>
        </div>
        <div style="font-size:11px;color:#888;margin-top:3px">Histórico: ${fmt(STATS_HIST[v].valor_medio)}/mês</div>
      </div>

      <div style="margin-bottom:12px">
        <label style="font-size:11px;font-weight:700;color:#666;display:block;margin-bottom:4px">META DE ITENS VENDIDOS</label>
        <div style="display:flex;gap:6px">
          <input type="number" id="m-itens-${idV}" value="${m.itens}" step="10"
            style="flex:1;font-size:13px;padding:6px 8px;border:1px solid ${c.bar}66;border-radius:6px">
          <button onclick="salvarMetaDireta('${v}','itens','m-itens-${idV}')"
            style="font-size:12px;padding:6px 12px;border-radius:6px;border:none;background:${c.bar};color:#fff;cursor:pointer;font-weight:600">OK</button>
        </div>
        <div style="font-size:11px;color:#888;margin-top:3px">Histórico: ${fmtN(STATS_HIST[v].itens_medio)} itens/mês</div>
      </div>

      <div>
        <label style="font-size:11px;font-weight:700;color:#666;display:block;margin-bottom:4px">META DE CLIENTES ATENDIDOS</label>
        <div style="display:flex;gap:6px">
          <input type="number" id="m-clientes-${idV}" value="${m.clientes}" step="1"
            style="flex:1;font-size:13px;padding:6px 8px;border:1px solid ${c.bar}66;border-radius:6px">
          <button onclick="salvarMetaDireta('${v}','clientes','m-clientes-${idV}')"
            style="font-size:12px;padding:6px 12px;border-radius:6px;border:none;background:${c.bar};color:#fff;cursor:pointer;font-weight:600">OK</button>
        </div>
        <div style="font-size:11px;color:#888;margin-top:3px">Histórico: ${fmtN(STATS_HIST[v].clientes_medio)} clientes/mês</div>
      </div>
    </div>`;
  });

  h+=`</div>
  <div style="margin-top:16px;padding:12px;background:#E6F1FB;border-radius:8px;font-size:12px;color:#0C447C">
    <strong>Como funciona a distribuição automática:</strong> Ao definir a meta de faturamento, ela é distribuída proporcionalmente para cada cliente baseado no histórico de compras de 2025-2026. 
    Clientes novos (sem histórico) recebem a média da carteira automaticamente.
  </div>
  </div></div>`;

  document.getElementById('conteudo').innerHTML=h;
}

function salvarMetaDireta(vendedor, pilar, inputId){
  const el=document.getElementById(inputId);
  if(!el) return;
  const val=parseFloat(el.value)||0;
  if(val>0){
    METAS[vendedor][pilar]=val;
    renderSecao();
  }
}

function salvarMeta(vendedor, pilar, id){
  const el=document.getElementById('inp-'+id);
  if(!el) return;
  const val=parseFloat(el.value)||0;
  if(val>0){
    METAS[vendedor][pilar]=val;
    renderVendedores();
  }
}

function toggleMetaEdit(id){
  const el=document.getElementById(id);
  if(el) el.classList.toggle('show');
}

function setSecao(s,btn){
  secaoAtiva=s;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  if(btn) btn.classList.add('active');
  if(dadosVendas.length>0||s==='metas') renderSecao();
  else carregar();
}

function setVendedor(v){
  vendedorAtivo=v;
  renderVendedores();
}

function setPeriodo(p,btn){
  periodoAtivo=p;
  document.querySelectorAll('.periodo-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  if(autenticado) carregar();
}

verificarAuth().then(ok=>{
  if(ok) carregar();
  else {
    document.getElementById('conteudo').innerHTML=`<div class="nologin">
      <h3>Bem-vindo ao Dashboard Comercial AquaSmart</h3>
      <p>Conecte o Conta Azul para ver os dados de vendas, itens e clientes em tempo real.</p>
      <button class="btn-grande" onclick="fazerLogin()">Conectar Conta Azul</button>
    </div>`;
  }
});
</script>
