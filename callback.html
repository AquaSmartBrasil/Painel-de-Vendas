<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Autorizando...</title>
<style>
body{font-family:Arial,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#f5f5f5}
.box{background:#fff;border-radius:12px;padding:2rem 3rem;text-align:center;border:1px solid #e0e0e0;max-width:400px}
.spinner{width:40px;height:40px;border:4px solid #eee;border-top:4px solid #185FA5;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
h2{font-size:18px;color:#185FA5;margin-bottom:8px}
p{font-size:13px;color:#888}
.ok{color:#1D9E75;font-size:16px;font-weight:600}
.erro{color:#c00;font-size:14px}
</style>
</head>
<body>
<div class="box">
  <div class="spinner" id="spinner"></div>
  <h2 id="titulo">Autorizando acesso...</h2>
  <p id="msg">Conectando ao Conta Azul. Aguarde...</p>
</div>
<script>
const WORKER = 'https://aquasmart-api.cassio-58a.workers.dev';

async function autorizar(){
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const erro = params.get('error');

  if(erro){
    document.getElementById('spinner').style.display='none';
    document.getElementById('titulo').textContent='Acesso negado';
    document.getElementById('msg').innerHTML='<span class="erro">Autorização cancelada. Feche esta janela e tente novamente.</span>';
    return;
  }

  if(!code){
    document.getElementById('spinner').style.display='none';
    document.getElementById('titulo').textContent='Erro';
    document.getElementById('msg').innerHTML='<span class="erro">Código de autorização não encontrado.</span>';
    return;
  }

  try{
    const resp = await fetch(`${WORKER}/token`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({code})
    });
    const data = await resp.json();

    if(data.ok){
      document.getElementById('spinner').style.display='none';
      document.getElementById('titulo').innerHTML='<span class="ok">✓ Conectado!</span>';
      document.getElementById('msg').textContent='Conta Azul autorizado com sucesso. Redirecionando...';
      setTimeout(()=>{
        window.location.href='dashboard_vendas.html';
      },1500);
    } else {
      throw new Error(data.error||'Erro desconhecido');
    }
  } catch(e){
    document.getElementById('spinner').style.display='none';
    document.getElementById('titulo').textContent='Erro na autorização';
    document.getElementById('msg').innerHTML=`<span class="erro">${e.message}</span>`;
  }
}

autorizar();
</script>
</body>
</html>
